<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة المخازن</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-warehouse"></i>
                </div>
                <h1 class="login-title">نظام إدارة المخازن</h1>
                <p class="login-subtitle">تسجيل الدخول إلى لوحة التحكم</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="loginUsername">
                        <i class="fas fa-user"></i>
                        اسم المستخدم
                    </label>
                    <input 
                        type="text" 
                        id="loginUsername" 
                        class="form-control" 
                        placeholder="أدخل اسم المستخدم"
                        autocomplete="username"
                        required
                    >
                    <span class="error-message" id="loginUsernameError"></span>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i>
                        كلمة المرور
                    </label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="loginPassword" 
                            class="form-control" 
                            placeholder="أدخل كلمة المرور"
                            autocomplete="current-password"
                            required
                        >
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="passwordToggle"
                            aria-label="إظهار كلمة المرور"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>
                
                <div class="form-group form-checkbox">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkbox-custom"></span>
                        <span>تذكرني</span>
                    </label>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginButton">
                        <i class="fas fa-sign-in-alt"></i>
                        تسجيل الدخول
                    </button>
                </div>
                
                <div class="login-error" id="loginError" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="loginErrorMessage"></span>
                </div>
            </form>
            
            <div class="login-footer">
                <div class="login-info">
                    <p><strong>بيانات الدخول الافتراضية:</strong></p>
                    <p><i class="fas fa-user"></i> admin</p>
                    <p><i class="fas fa-lock"></i> admin123</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/script.js" defer></script>
</body>
</html>
